<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilitha's 21st Birthday Invite</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', serif;
      background: radial-gradient(circle at top, #3b2a4d 0%, #161118 45%, #050505 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow-x: hidden;
    }

    .page {
      width: min(100%, 920px);
      min-height: min(100vh, 900px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: min(100%, 620px);
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(190, 160, 255, 0.35);
      border-radius: 28px;
      padding: clamp(22px, 5vw, 42px);
      text-align: center;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.65);
      position: relative;
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(126, 73, 204, 0.22);
      filter: blur(8px);
      z-index: 0;
    }

    .card::before {
      top: -70px;
      left: -70px;
    }

    .card::after {
      bottom: -80px;
      right: -70px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .small-text {
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: clamp(0.78rem, 2.5vw, 0.95rem);
      color: #cfc8d8;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2.1rem, 10vw, 5.2rem);
      line-height: 0.95;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .purple-script {
      font-family: 'Brush Script MT', cursive;
      font-size: clamp(2.4rem, 12vw, 5.8rem);
      color: #9d78ff;
      line-height: 0.8;
      margin-bottom: 22px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 22px 0 28px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 14px 8px;
    }

    .time-box span {
      display: block;
      font-size: clamp(1.3rem, 6vw, 2.2rem);
      font-weight: bold;
    }

    .time-box small {
      display: block;
      margin-top: 4px;
      color: #cfc8d8;
      font-size: clamp(0.65rem, 2vw, 0.82rem);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .question {
      font-size: clamp(1.05rem, 4vw, 1.45rem);
      margin-bottom: 18px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 60px;
      position: relative;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: bold;
      transition: 0.25s ease;
    }

    .yes-btn,
    .come-btn {
      background: linear-gradient(135deg, #7e49cc, #c8b6ff);
      color: white;
      box-shadow: 0 10px 24px rgba(126, 73, 204, 0.35);
    }

    .no-btn {
      background: #eeeeee;
      color: #1a1a1a;
      position: relative;
    }

    .hidden {
      display: none;
    }

    .cat-img {
      width: min(100%, 360px);
      border-radius: 24px;
      margin: 18px auto;
      display: block;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .invite-section {
      width: min(100%, 760px);
      text-align: center;
    }

    .invite-img {
      width: min(100%, 520px);
      max-height: 92vh;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .hint {
      margin-top: 14px;
      color: #ddd4ee;
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .page {
        min-height: 100vh;
        padding-top: 12px;
      }

      .card {
        border-radius: 22px;
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      button {
        width: 100%;
      }

      .no-btn.runaway {
        width: auto;
      }
    }
  

    .floating-balloon {
      position: fixed;
      bottom: -120px;
      width: 70px;
      opacity: 0.8;
      animation: floatUp linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    .floating-balloon::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, #9d78ff 60%, #5f2ca5 100%);
      box-shadow: inset -10px -10px 18px rgba(0,0,0,0.25);
    }

    .floating-balloon::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 90px;
      background: rgba(255,255,255,0.6);
      left: 50%;
      top: 85px;
    }

    .balloon1 {
      left: 5%;
      animation-duration: 16s;
      transform: scale(0.9);
    }

    .balloon2 {
      left: 22%;
      animation-duration: 20s;
      animation-delay: 3s;
      transform: scale(0.75);
    }

    .balloon3 {
      left: 48%;
      animation-duration: 18s;
      animation-delay: 6s;
      transform: scale(1);
    }

    .balloon4 {
      left: 72%;
      animation-duration: 22s;
      animation-delay: 2s;
      transform: scale(0.8);
    }

    .balloon5 {
      left: 88%;
      animation-duration: 17s;
      animation-delay: 8s;
      transform: scale(0.7);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 0.85;
      }

      50% {
        transform: translateY(-55vh) rotate(6deg);
      }

      100% {
        transform: translateY(-130vh) rotate(-8deg);
        opacity: 0;
      }
    }
</style>
</head>
<body>
  <div class="floating-balloon balloon1"></div>
  <div class="floating-balloon balloon2"></div>
  <div class="floating-balloon balloon3"></div>
  <div class="floating-balloon balloon4"></div>
  <div class="floating-balloon balloon5"></div>

  <main class="page">
    <section class="card" id="questionPage">
      <div class="content">
        <p class="small-text">Lilitha is turning</p>
        <h1>21</h1>
        <div class="purple-script">birthday countdown</div>

        <div class="countdown" aria-label="Countdown to Lilitha's birthday celebration">
          <div class="time-box"><span id="days">00</span><small>Days</small></div>
          <div class="time-box"><span id="hours">00</span><small>Hours</small></div>
          <div class="time-box"><span id="minutes">00</span><small>Minutes</small></div>
          <div class="time-box"><span id="seconds">00</span><small>Seconds</small></div>
        </div>

        <div id="questionOne">
          <p class="question">Do you know Lilitha Ndzoyiya?</p>
          <div class="buttons">
            <button class="yes-btn" onclick="showSecondQuestion()">Yes 💜</button>
            <button class="no-btn runaway" id="noBtn1">No</button>
          </div>
        </div>

        <div id="questionTwo" class="hidden">
          <p class="question">Did you know she's turning 21 this year?</p>
          <div class="buttons">
            <button class="yes-btn" onclick="showInvite()">Yes 😍</button>
            <button class="no-btn runaway" id="noBtn2">No</button>
          </div>
        </div>

        <div id="catPage" class="hidden">
          <p class="question">Hayibo! After all those no's? 😭</p>
          <img src="6825836930105414(1).jpeg" alt="Angry cat meme" class="cat-img" />
          <button class="come-btn" onclick="showInvite()">Okay, okay I will come 😭</button>
        </div>
      </div>
    </section>

    <section class="invite-section hidden" id="invitePage">
      <img src="ChatGPT Image May 16, 2026, 10_58_53 AM.png" alt="Lilitha's 21st birthday invitation" class="invite-img" />
      <p class="hint">Screenshot or save this invite 💜</p>
    </section>
  </main>

  <script>
    const celebrationDate = new Date('2026-09-05T13:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = celebrationDate - now;

      if (distance <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    let noAttempts = 0;
    const maxAttempts = 5;

    function showSecondQuestion() {
      document.getElementById('questionOne').classList.add('hidden');
      document.getElementById('questionTwo').classList.remove('hidden');
    }

    function showCat() {
      document.getElementById('questionOne').classList.add('hidden');
      document.getElementById('questionTwo').classList.add('hidden');
      document.getElementById('catPage').classList.remove('hidden');
    }

    function showInvite() {
      document.getElementById('questionPage').classList.add('hidden');
      document.getElementById('invitePage').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function moveNoButton(button) {
      noAttempts++;

      if (noAttempts >= maxAttempts) {
        showCat();
        return;
      }

      const padding = 20;
      const maxX = window.innerWidth - button.offsetWidth - padding;
      const maxY = window.innerHeight - button.offsetHeight - padding;
      const x = Math.max(padding, Math.random() * maxX);
      const y = Math.max(padding, Math.random() * maxY);

      button.style.position = 'fixed';
      button.style.left = `${x}px`;
      button.style.top = `${y}px`;
      button.style.zIndex = '99';
    }

    document.querySelectorAll('.runaway').forEach((button) => {
      button.addEventListener('mouseenter', () => moveNoButton(button));
      button.addEventListener('click', () => moveNoButton(button));
      button.addEventListener('touchstart', (event) => {
        event.preventDefault();
        moveNoButton(button);
      }, { passive: false });
    });
  </script>
</body>
</html>
